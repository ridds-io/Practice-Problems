name: Update Stats
on: [push]

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Calculate and Update
        run: |
          # 1. Calculate Total (Excluding README, .github, and hidden files)
          TOTAL=$(git ls-files | grep -v -e "README.md" -e ".github/" -e "^\." | wc -l)
          sed -i "s/<!-- TOTAL -->.*<!-- TOTAL_END -->/<!-- TOTAL -->$TOTAL<!-- TOTAL_END -->/" README.md

          # 2. List of topics (Folder names)
          TOPICS=("Mathematics" "List" "Recursion" "Sorting" "Searching" "Hashing")

          # 3. Loop through topics and update README
          for TOPIC in "${TOPICS[@]}"; do
            if [ -d "$TOPIC" ]; then
              COUNT=$(git ls-files "$TOPIC/" | wc -l)
              # Updates the number between the specific topic tags
              sed -i "s/<!-- $TOPIC -->.*<!-- END -->/<!-- $TOPIC -->$COUNT<!-- END -->/" README.md
            fi
          done
          git add README.md  # Manually stage the change
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update problem counts [skip ci]"
