name: Update Stats
on:
  push:
    branches:
      - main  
    paths:
      - '**/*.py'        # Runs if any Python file anywhere is changed
      - '!README.md'     # Don't run if ONLY the README is changed
      
permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Calculate and Update
        run: |
          # Force the runner to update its view of the files
          git update-index --refresh || true 
          
          # 1. Total Count (Adding -c to count all files in the directory)
          TOTAL=$(git ls-files | grep -v -e "README.md" -e ".github/" -e "^\." | wc -l)
          sed -i "s/<!-- TOTAL -->.*<!-- TOTAL_END -->/<!-- TOTAL -->$TOTAL<!-- TOTAL_END -->/" README.md

          # 2. List of topics
          TOPICS=("Mathematics" "List" "Recursion" "Sorting" "Searching" "Hashing")

          # 3. Loop through topics
          for TOPIC in "${TOPICS[@]}"; do
            if [ -d "$TOPIC" ]; then
              # Use find to count files physically present in the folder
              COUNT=$(find "$TOPIC" -type f | wc -l)
              sed -i "s/<!-- $TOPIC -->.*<!-- END -->/<!-- $TOPIC -->$COUNT<!-- END -->/" README.md
            fi
          done
          git add README.md  # Manually stage the change
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update problem counts [skip ci]"
